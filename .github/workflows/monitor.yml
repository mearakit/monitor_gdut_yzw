name: GDUT YZW Monitor

on:
  schedule:
    # 北京时间 8:00, 12:00, 17:00 (UTC 0:00, 4:00, 9:00)
    - cron: '0 0 * * *'   # 08:00 北京时间
    - cron: '0 4 * * *'   # 12:00 北京时间
    - cron: '0 9 * * *'   # 17:00 北京时间
  
  # 允许手动触发（方便测试）
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
      
      - name: Run monitor script
        run: |
          python monitor_gdut_yzw.py
