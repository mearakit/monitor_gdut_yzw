name: GDUT YZW Monitor

on:
  schedule:
    # 每30分钟运行一次 (UTC时间，北京时间需要+8)
    - cron: '*/30 * * * *'
  
  # 允许手动触发（方便测试）
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
      
      - name: Run monitor script
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        run: |
          echo "Debug: Checking env variables..."
          echo "SENDER_EMAIL is set: ${{ secrets.SENDER_EMAIL != '' }}"
          echo "SENDER_PASSWORD is set: ${{ secrets.SENDER_PASSWORD != '' }}"
          echo "RECEIVER_EMAIL is set: ${{ secrets.RECEIVER_EMAIL != '' }}"
          echo "QWEN_API_KEY is set: ${{ secrets.QWEN_API_KEY != '' }}"
          python monitor_gdut_yzw.py
